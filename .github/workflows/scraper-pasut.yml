name: Auto Scraper TMA Priok

on:
  schedule:
    - cron: '*/15 * * * *' # Jalan otomatis tiap 15 menit
  workflow_dispatch: # Biar lu bisa klik manual kapan aja

permissions:
  contents: write # Izin wajib buat nulis data ke repo

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install selenium webdriver-manager pandas pytz openpyxl

      - name: Eksekusi Background Scraper
        run: python scraper_khusus.py 

      - name: Commit dan Push Hasil CSV
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update data TMA [skip ci]"
          file_pattern: 'history_aws_priok.csv history_bpbd_pasarikan.csv'
          # Hanya commit kalau ada perubahan di file CSV
          skip_dirty_check: false    
          branch: main
