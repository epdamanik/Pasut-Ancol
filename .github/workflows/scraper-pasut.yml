name: Auto Scraper TMA Priok

on:
  schedule:
    - cron: '*/15 * * * *' 
  workflow_dispatch: 

permissions:
  contents: write
  actions: write # INI KUNCINYA: Biar gak ditolak pas push

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install selenium webdriver-manager pandas pytz openpyxl

      - name: Eksekusi Background Scraper
        run: python scraper_khusus.py 

      - name: Commit dan Push Hasil CSV ke Repo
        run: |
          git config --global user.name "Bot-Stamar-Priok"
          git config --global user.email "bot@github.com"
          
          # Tambahkan file CSV
          git add history_aws_priok.csv history_bpbd_pasarikan.csv
          
          # Commit jika ada perubahan
          git commit -m "Auto-update data TMA [skip ci]" || exit 0
          
          # GUNAKAN GITHUB_TOKEN Bawaan biar tembus permission
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force
