name: Auto Scraper TMA Priok

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: 

# Kasih semua izin biar gak ada alasan 'Permission Denied'
permissions:
  contents: write
  actions: write
  workflows: write

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install selenium webdriver-manager pandas pytz openpyxl

      - name: Eksekusi Background Scraper
        run: python scraper_khusus.py 

      - name: Push Hasil Secara Paksa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Bot-Stamar-Priok"
          git config --global user.email "bot@github.com"
          
          # Ambil perubahan terbaru biar gak tabrakan
          git fetch origin main
          
          git add history_aws_priok.csv history_bpbd_pasarikan.csv
          
          # Commit kalau ada perubahan, kalau gak ada langsung skip
          git commit -m "Auto-update data TMA [skip ci]" || exit 0
          
          # Push pake token akses biar tembus blokir permission
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force
