name: Auto Scraper TMA Priok Ancol

on:
  schedule:
    - cron: '*/15 * * * *' # Jalan tiap 15 menit
  workflow_dispatch: # Bisa di-run manual

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wajib untuk push

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ambil semua history biar pull rebase lancar

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas selenium webdriver-manager pytz

      - name: Eksekusi Background Scraper
        run: python scraper_khusus.py

      - name: Commit dan Push Hasil CSV ke Repo
        run: |
          git config --global user.name "Bot-Stamar-Priok"
          git config --global user.email "bot@github.com"
          
          # Add kedua file secara eksplisit
          git add history_aws_ancol.csv history_bpbd_pasarikan.csv
          
          # Commit jika ada perubahan
          git commit -m "Auto-update data TMA: $(date +'%Y-%m-%d %H:%M') [skip ci]" || echo "No changes"
          
          # Rebase dulu sebelum push untuk menghindari 'rejected'
          git pull origin main --rebase
          git push origin main
