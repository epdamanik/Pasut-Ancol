name: Auto Scraper TMA Priok

on:
  # Pemicu utama via API Google Apps Script atau tombol manual
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install selenium webdriver-manager pandas pytz openpyxl

      - name: Eksekusi Background Scraper
        run: python scraper_khusus.py 

      - name: Commit dan Push Hasil CSV ke Repo
        run: |
          git config --global user.name "Bot-Stamar-Priok"
          git config --global user.email "bot@github.com"
          
          # Pakai wildcard *.csv agar semua file history terdeteksi
          git add history_aws_priok.csv history_bpbd_pasarikan.csv
          
          # Cek status file untuk log
          git status
          
          # Commit hanya jika ada perubahan. Jika tidak ada, tidak akan error (exit 0)
          git commit -m "Auto-update data TMA: $(date +'%Y-%m-%d %H:%M') [skip ci]" || echo "Tidak ada perubahan data untuk di-commit"
          
          # Push hasil ke repository
          git push origin main
