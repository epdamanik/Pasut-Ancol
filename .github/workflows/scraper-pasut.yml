name: Auto Scraper TMA Priok

on:
  schedule:
    - cron: '*/15 * * * *' # Gue balikin biar otomatis jalan tiap 15 menit
  workflow_dispatch: # Lu tetep bisa klik manual dari Apps Script atau GitHub

permissions:
  contents: write

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ambil history lengkap biar gak error pas push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install selenium webdriver-manager pandas pytz openpyxl

      - name: Eksekusi Background Scraper
        run: python scraper_khusus.py 

      - name: Commit dan Push Hasil CSV ke Repo
        run: |
          git config --global user.name "Bot-Stamar-Priok"
          git config --global user.email "bot@github.com"
          
          # Tambahkan file secara spesifik
          git add history_aws_priok.csv history_bpbd_pasarikan.csv
          
          # Commit jika ada perubahan, kalau gak ada ya exit santai
          git commit -m "Auto-update data TMA [skip ci]" || exit 0
          
          # OBATNYA DI SINI: Sebutkan origin dan branch-nya secara jelas
          git push origin main
