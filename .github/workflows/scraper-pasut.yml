name: Auto Scraper TMA Priok

on:
  # Kita hapus cron bawaan karena sering ngaret (jam karet)
  # Sekarang pemicu utamanya adalah API dari Google Apps Script
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    
    # Menghilangkan warning Node.js agar log lebih bersih
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install selenium webdriver-manager pandas pytz openpyxl

      - name: Eksekusi Background Scraper
        run: python scraper_khusus.py 

      - name: Commit dan Push Hasil CSV ke Repo
        run: |
          git config --global user.name "Bot-Stamar-Priok"
          git config --global user.email "bot@github.com"
          # Menambahkan file CSV hasil scraping
          git add history_aws_priok.csv history_bpbd_pasarikan.csv
          # Commit hanya jika ada perubahan data, [skip ci] agar tidak trigger loop
          git commit -m "Auto-update data TMA [skip ci]" || exit 0
          git push
